name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no tag/release created)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Get next version
        id: semver
        uses: ietf-tools/semver-action@v1
        with:
          token: ${{ github.token }}
          branch: master

      - name: Check for changes
        id: check
        run: |
          if [ "${{ steps.semver.outputs.next }}" == "" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No version bump needed"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Next version: ${{ steps.semver.outputs.next }}"
          fi

      - name: Generate changelog
        id: changelog
        if: steps.check.outputs.has_changes == 'true'
        run: |
          NEXT_VERSION="${{ steps.semver.outputs.next }}"
          CURRENT_VERSION="${{ steps.semver.outputs.current }}"

          echo "# Release $NEXT_VERSION" > changelog.md
          echo "" >> changelog.md

          # Get commits since last tag
          if [ -n "$CURRENT_VERSION" ]; then
            COMMITS=$(git log --pretty=format:"%s|%h" $CURRENT_VERSION..HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s|%h" HEAD)
          fi

          # Categorize commits
          echo "## Changes" >> changelog.md
          echo "" >> changelog.md

          # Breaking changes
          BREAKING=$(echo "$COMMITS" | grep -E "^[a-z]+(\(.+\))?!:|BREAKING CHANGE:" || true)
          if [ -n "$BREAKING" ]; then
            echo "### Breaking Changes" >> changelog.md
            echo "$BREAKING" | while IFS='|' read -r subject hash; do
              echo "- $subject ($hash)" >> changelog.md
            done
            echo "" >> changelog.md
          fi

          # Features
          FEATURES=$(echo "$COMMITS" | grep -E "^feat(\(.+\))?:" || true)
          if [ -n "$FEATURES" ]; then
            echo "### Features" >> changelog.md
            echo "$FEATURES" | while IFS='|' read -r subject hash; do
              echo "- $subject ($hash)" >> changelog.md
            done
            echo "" >> changelog.md
          fi

          # Fixes
          FIXES=$(echo "$COMMITS" | grep -E "^fix(\(.+\))?:" || true)
          if [ -n "$FIXES" ]; then
            echo "### Bug Fixes" >> changelog.md
            echo "$FIXES" | while IFS='|' read -r subject hash; do
              echo "- $subject ($hash)" >> changelog.md
            done
            echo "" >> changelog.md
          fi

          # Other changes
          OTHERS=$(echo "$COMMITS" | grep -E "^(docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?:" || true)
          if [ -n "$OTHERS" ]; then
            echo "### Other Changes" >> changelog.md
            echo "$OTHERS" | while IFS='|' read -r subject hash; do
              echo "- $subject ($hash)" >> changelog.md
            done
            echo "" >> changelog.md
          fi

          cat changelog.md

      - name: Update package.json version
        if: steps.check.outputs.has_changes == 'true' && inputs.dry_run == false
        run: |
          NEW_VERSION="${{ steps.semver.outputs.nextStrict }}"
          npm version $NEW_VERSION --no-git-tag-version

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.semver.outputs.next }}"
          git push

      - name: Create tag and release
        if: steps.check.outputs.has_changes == 'true' && inputs.dry_run == false
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.semver.outputs.next }}
          name: ${{ steps.semver.outputs.next }}
          bodyFile: changelog.md
          token: ${{ github.token }}

      - name: Dry run summary
        if: inputs.dry_run == true
        run: |
          echo "## Dry Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.has_changes }}" == "true" ]; then
            echo "**Current version:** ${{ steps.semver.outputs.current }}" >> $GITHUB_STEP_SUMMARY
            echo "**Next version:** ${{ steps.semver.outputs.next }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Changelog" >> $GITHUB_STEP_SUMMARY
            cat changelog.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes to release" >> $GITHUB_STEP_SUMMARY
          fi
